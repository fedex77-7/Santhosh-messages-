<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santhosh Message - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #0284c7;
            --border-color: #e2e8f0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding: 20px; }

        .auth-container { max-width: 380px; margin: 80px auto; padding: 30px; background: white; border-radius: 16px; box-shadow: var(--shadow); text-align: center; border: 1px solid var(--border-color); }
        .auth-container h2 { margin-bottom: 8px; color: var(--accent-color); font-weight: 800; }
        .auth-container p { font-size: 11px; color: var(--text-secondary); margin-bottom: 20px; font-weight: 700; letter-spacing: 1px; }
        input { width: 100%; padding: 12px 16px; margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; font-size: 14px; }
        button { width: 100%; padding: 12px; background: var(--accent-color); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }

        .dashboard { display: none; max-width: 1100px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: white; padding: 15px 20px; border-radius: 12px; box-shadow: var(--shadow); }
        .role-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .role-developer { background: #e0f2fe; color: #0369a1; }
        .role-admin { background: #fef3c7; color: #b45309; }

        .user-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: var(--shadow); border: 1px solid var(--border-color); }
        .dev-box { background: #0f172a; color: #f8fafc; padding: 15px; border-radius: 8px; font-size: 13px; margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
        
        .btn-action { padding: 6px 14px; font-size: 12px; font-weight: 600; border-radius: 6px; border: none; cursor: pointer; width: auto; display: inline-block; }
        .btn-ban { background: #ef4444; color: white; } 
        .btn-unban { background: #10b981; color: white; } 
        .btn-hist { background: #38bdf8; color: #0f172a; margin-top: 8px; font-weight: 700; }
        .btn-req { background: #f59e0b; color: white; }

        .req-section { background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--border-color); }
        .req-item { padding: 10px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="auth-screen" class="auth-container">
        <h2>Santhosh Message</h2>
        <p>POWERED BY REXO INTERNATIONAL</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login to Panel</button>
        <p id="login-error" style="color: red; margin-top: 10px; font-size: 12px; display: none;">Invalid Credentials!</p>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboard-screen" class="dashboard">
        <div class="header">
            <div>
                <h2 style="font-size: 20px;">Management Dashboard</h2>
                <span id="role-tag" class="role-badge"></span>
            </div>
            <button onclick="location.reload()" style="width: auto; background: #64748b; padding: 8px 16px;">Logout</button>
        </div>

        <!-- Pending Ban Requests for Developer View -->
        <div id="developer-req-box" class="req-section" style="display: none;">
            <h3 style="color: #b45309; font-size: 15px;"><i class="fas fa-exclamation-triangle"></i> Ban Requests from Admin</h3>
            <div id="req-list-container" style="margin-top: 10px;"></div>
        </div>

        <h3 style="margin-bottom: 15px; font-size: 16px;">Registered Users Database</h3>
        <div id="users-list-container"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDXhvtxcmDVhScJwQu-0B4JI_pi2Ps5Ysg",
            authDomain: "mychatapp5643.firebaseapp.com",
            databaseURL: "https://mychatapp5643-default-rtdb.firebaseio.com/",
            projectId: "mychatapp5643",
            storageBucket: "mychatapp5643.firebasestorage.app",
            messagingSenderId: "328590556877",
            appId: "1:328590556877:web:e16c3b31fc22375428f384"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentRole = "";

        function login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const err = document.getElementById('login-error');

            if (u === "dev_master_santhosh_99" && p === "Secured#Dev@2026!X") {
                currentRole = "developer"; startDashboard();
            } else if (u === "adminsanthoshmsg@123" && p === "adminanson@1234") {
                currentRole = "admin"; startDashboard();
            } else { err.style.display = "block"; }
        }

        function startDashboard() {
            document.getElementById('auth-screen').style.display = "none";
            document.getElementById('dashboard-screen').style.display = "block";
            
            const tag = document.getElementById('role-tag');
            tag.innerText = currentRole.toUpperCase();
            tag.className = "role-badge " + (currentRole === 'developer' ? 'role-developer' : 'role-admin');

            if (currentRole === 'developer') {
                document.getElementById('developer-req-box').style.display = "block";
                listenToBanRequests();
            }

            loadUsers();
        }

        function loadUsers() {
            database.ref('users').on('value', (snapshot) => {
                const box = document.getElementById('users-list-container'); 
                box.innerHTML = "";

                snapshot.forEach((child) => {
                    const name = child.key; 
                    const u = child.val();
                    const card = document.createElement('div');
                    card.className = "user-card";

                    let actionBtn = "";
                    if (currentRole === 'developer') {
                        actionBtn = u.banned ? 
                            `<button class="btn-action btn-unban" onclick="toggleBan('${name}', false)">Unban</button>` :
                            `<button class="btn-action btn-ban" onclick="toggleBan('${name}', true)">Ban User</button>`;
                    } else {
                        actionBtn = u.banned ? 
                            `<span style="color:red; font-weight:700; font-size:12px;">BANNED</span>` :
                            `<button class="btn-action btn-req" onclick="sendBanRequest('${name}', '${u.lastIP || 'N/A'}')">Request Ban</button>`;
                    }

                    let content = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <strong style="font-size:16px;">${name}</strong> 
                                <span style="font-size:12px; color:var(--text-secondary); margin-left:8px;">(${u.email || 'No Email'})</span>
                            </div>
                            <div>${actionBtn}</div>
                        </div>
                    `;

                    // ഡെവലപ്പർ ആണെങ്കിൽ മാത്രം IP, ISP, Browser, Login History കാണിക്കും
                    if (currentRole === 'developer') {
                        content += `
                            <div class="dev-box">
                                <div><strong style="color:#38bdf8;">🌐 IP Address:</strong> ${u.lastIP || 'N/A'}</div>
                                <div><strong style="color:#38bdf8;">📡 Internet Provider (ISP):</strong> ${u.lastISP || 'N/A'}</div>
                                <div><strong style="color:#38bdf8;">💻 Browser Agent:</strong> ${u.lastBrowser || 'N/A'}</div>
                                <div><strong style="color:#38bdf8;">🕒 Last Seen:</strong> ${new Date(u.lastSeen).toLocaleString()}</div>
                                <button class="btn-action btn-hist" onclick="viewHistory('${name}')">View Full Login History</button>
                            </div>
                        `;
                    }

                    card.innerHTML = content;
                    box.appendChild(card);
                });
            });
        }

        function toggleBan(user, status) {
            database.ref('users/' + user).update({ banned: status });
            if (!status) database.ref('ban_requests/' + user).remove();
        }

        function sendBanRequest(username, ip) {
            database.ref('ban_requests/' + username).set({
                username: username,
                ip: ip,
                requestedBy: "Admin Santhosh",
                timestamp: Date.now()
            }).then(() => {
                alert("Ban request sent to Developer!");
            });
        }

        function listenToBanRequests() {
            database.ref('ban_requests').on('value', (snapshot) => {
                const reqContainer = document.getElementById('req-list-container');
                reqContainer.innerHTML = "";
                
                if(!snapshot.exists()) {
                    reqContainer.innerHTML = "<p style='font-size:12px; color:var(--text-secondary);'>No pending requests.</p>";
                    return;
                }

                snapshot.forEach((child) => {
                    const req = child.val();
                    const item = document.createElement('div');
                    item.className = "req-item";
                    item.innerHTML = `
                        <div style="font-size:13px;">
                            <strong>User:</strong> ${req.username} | <strong>IP:</strong> <span style="color:#ef4444; font-weight:700;">${req.ip}</span>
                        </div>
                        <button class="btn-action btn-ban" onclick="toggleBan('${req.username}', true)">Approve Ban</button>
                    `;
                    reqContainer.appendChild(item);
                });
            });
        }

        function viewHistory(user) {
            database.ref('loginHistory/' + user).once('value', (snapshot) => {
                if(!snapshot.exists()) { alert("No login history available."); return; }
                let logs = `--- LOGIN HISTORY FOR: ${user} ---\n\n`;
                snapshot.forEach((item) => {
                    const d = item.val();
                    logs += `[${new Date(d.timestamp).toLocaleString()}] ${d.type}\nIP: ${d.ip}\nISP: ${d.isp}\nBrowser: ${d.browser}\n\n`;
                });
                alert(logs);
            });
        }
    </script>
</body>
</html>
