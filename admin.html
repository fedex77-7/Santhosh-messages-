<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santhosh Message - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #1e293b;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Admin Login Box Styling */
        .login-container {
            background: #ffffff;
            padding: 30px 25px;
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .login-container h2 {
            color: #0284c7;
            margin-bottom: 5px;
            font-size: 22px;
        }

        .login-container p {
            font-size: 11px;
            color: #64748b;
            letter-spacing: 1px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .login-container input {
            width: 100%;
            padding: 12px 16px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            color: #1e293b;
            font-size: 14px;
            margin-bottom: 14px;
            outline: none;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            background-color: #0284c7;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Dashboard Container (Hidden by default) */
        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: none; /* ലോഗിൻ ചെയ്ത ശേഷം മാത്രം കാണിക്കും */
            align-self: flex-start;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .header h1 {
            color: #0284c7;
            font-size: 24px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-info h3 {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 5px;
        }

        .stat-info p {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .total-card .stat-icon { background: #e0f2fe; color: #0284c7; }
        .active-card .stat-icon { background: #dcfce7; color: #15803d; }
        .banned-card .stat-icon { background: #fee2e2; color: #b91c1c; }

        /* User Table section */
        .table-container {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            padding: 20px;
        }

        .table-container h2 {
            margin-bottom: 20px;
            font-size: 18px;
            color: #1e293b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
        }

        th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-online { background: #dcfce7; color: #15803d; }
        .status-offline { background: #f1f5f9; color: #64748b; }
        .status-banned { background: #fee2e2; color: #b91c1c; }

        .btn-action {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-ban { background: #fee2e2; color: #b91c1c; }
        .btn-ban:hover { background: #fca5a5; }
        .btn-unban { background: #dcfce7; color: #15803d; }
        .btn-unban:hover { background: #86efac; }
    </style>
</head>
<body>

    <!-- ================= ADMIN LOGIN BOX ================= -->
    <div id="admin-login-box" class="login-container">
        <h2>Admin Access</h2>
        <p>SANTHOSH MESSAGE SECURITY</p>
        <input type="text" id="admin-user" placeholder="Admin Username">
        <input type="password" id="admin-pass" placeholder="Admin Password">
        <button id="admin-login-btn">Secure Login</button>
        <div id="login-err" style="color: red; font-size: 13px; margin-top: 12px; display: none; font-weight: 500;"></div>
    </div>

    <!-- ================= MAIN DASHBOARD CONTAINER ================= -->
    <div id="admin-dashboard" class="dashboard-container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-user-shield"></i> Santhosh Message - Admin Panel</h1>
            <span style="font-size: 14px; color: #64748b; font-weight: 500;">Powered by Rexo International</span>
        </div>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card total-card">
                <div class="stat-info">
                    <h3>Total Users</h3>
                    <p id="stat-total">0</p>
                </div>
                <div class="stat-icon"><i class="fas fa-users"></i></div>
            </div>
            <div class="stat-card active-card">
                <div class="stat-info">
                    <h3>Active Now</h3>
                    <p id="stat-active">0</p>
                </div>
                <div class="stat-icon"><i class="fas fa-circle"></i></div>
            </div>
            <div class="stat-card banned-card">
                <div class="stat-info">
                    <h3>Banned Users</h3>
                    <p id="stat-banned">0</p>
                </div>
                <div class="stat-icon"><i class="fas fa-user-slash"></i></div>
            </div>
        </div>

        <!-- User Management Table -->
        <div class="table-container">
            <h2>User Management</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Email ID</th>
                            <th>Last Seen / Activity</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <!-- ഡാറ്റ ഇവിടെ ലോഡ് ചെയ്യും -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // ഫയർബേസ് കോൺഫിഗറേഷൻ
        const firebaseConfig = {
            apiKey: "AIzaSyDXhvtxcmDVhScJwQu-0B4JI_pi2Ps5Ysg",
            authDomain: "mychatapp5643.firebaseapp.com",
            databaseURL: "https://mychatapp5643-default-rtdb.firebaseio.com/",
            projectId: "mychatapp5643",
            storageBucket: "mychatapp5643.firebasestorage.app",
            messagingSenderId: "328590556877",
            appId: "1:328590556877:web:e16c3b31fc22375428f384",
            measurementId: "G-BF11J6MH8Q"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // [ADDED] നിങ്ങൾ നൽകിയ അഡ്മിൻ ലോഗിൻ വിവരങ്ങൾ
        const TARGET_ADMIN_USER = "adminsanthoshmsg@123";
        const TARGET_ADMIN_PASS = "adminanson@1234";

        document.getElementById('admin-login-btn').addEventListener('click', () => {
            const enteredUser = document.getElementById('admin-user').value.trim();
            const enteredPass = document.getElementById('admin-pass').value.trim();
            const errDiv = document.getElementById('login-err');

            if(enteredUser === TARGET_ADMIN_USER && enteredPass === TARGET_ADMIN_PASS) {
                // ലോഗിൻ സക്സസ് ആയാൽ ബോക്സ് മാറ്റി ഡാഷ്‌ബോർഡ് കാണിക്കുന്നു
                document.getElementById('admin-login-box').style.display = 'none';
                
                const dashboard = document.getElementById('admin-dashboard');
                dashboard.style.display = 'block';
                document.body.style.alignItems = 'flex-start'; // ലേഔട്ട് ടോപ്പിലേക്ക് മാറ്റാൻ
                
                // ഫയർബേസ് ഡാറ്റ ലോഡ് ചെയ്യാൻ തുടങ്ങുന്നു
                loadDashboardData();
            } else {
                errDiv.innerText = "Invalid Admin Credentials!";
                errDiv.style.display = 'block';
            }
        });

        // ഡാഷ്‌ബോർഡ് ലൈവ് അപ്‌ഡേറ്റ് ഫങ്ക്ഷൻ
        function loadDashboardData() {
            database.ref('users').on('value', (snapshot) => {
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = "";

                let totalUsers = 0;
                let activeUsers = 0;
                let bannedUsers = 0;

                snapshot.forEach((userSnapshot) => {
                    totalUsers++;
                    const username = userSnapshot.key;
                    const userData = userSnapshot.val();
                    
                    const email = userData.email || "N/A";
                    const isOnline = userData.online === true;
                    const isBanned = userData.banned === true;
                    const lastSeenTime = userData.lastSeen ? formatTime(userData.lastSeen) : "Never";

                    if (isBanned) bannedUsers++;
                    else if (isOnline) activeUsers++;

                    let statusBadge = `<span class="status-badge status-offline">Offline</span>`;
                    if (isBanned) {
                        statusBadge = `<span class="status-badge status-banned">Banned</span>`;
                    } else if (isOnline) {
                        statusBadge = `<span class="status-badge status-online">Online</span>`;
                    }

                    let actionButton = `<button class="btn-action btn-ban" onclick="toggleBan('${username}', true)">Ban User</button>`;
                    if (isBanned) {
                        actionButton = `<button class="btn-action btn-unban" onclick="toggleBan('${username}', false)">Unban</button>`;
                    }

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td style="font-weight:600;">${username}</td>
                        <td>${email}</td>
                        <td>${lastSeenTime}</td>
                        <td>${statusBadge}</td>
                        <td>${actionButton}</td>
                    `;
                    tbody.appendChild(row);
                });

                document.getElementById('stat-total').innerText = totalUsers;
                document.getElementById('stat-active').innerText = activeUsers;
                document.getElementById('stat-banned').innerText = bannedUsers;
            });
        }

        // ബാൻ / അൺബാൻ ചെയ്യാനുള്ള ഫങ്ക്ഷൻ
        function toggleBan(username, banStatus) {
            const actionText = banStatus ? "ban" : "unban";
            if (confirm(`Do you really want to ${actionText} ${username}?`)) {
                database.ref('users/' + username).update({
                    banned: banStatus,
                    online: banStatus ? false : false
                }).then(() => {
                    alert(`User ${username} successfully ${actionText}ned.`);
                });
            }
        }

        // സമയം ഫോർമാറ്റ് ചെയ്യാനുള്ള ഫങ്ക്ഷൻ
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true, day: 'numeric', month: 'short' });
        }
    </script>
</body>
</html>
