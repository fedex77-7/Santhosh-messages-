<!DOCTYPE html>
<html lang="ml" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santhosh Messages Pro</title>
    
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================= PREMIUM MODERN THEME COLORS ================= */
        :root[data-theme="light"] {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-sidebar: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #059669; /* Emerald Green */
            --accent-hover: #047857;
            --border-color: #e2e8f0;
            --chat-bg: #eae6df; /* Classic WhatsApp Chat BG */
            --msg-sent: #d9fdd3;
            --msg-received: #ffffff;
            --msg-text-sent: #111b21;
            --msg-text-received: #111b21;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --neon-glow: none;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0b141a; /* WhatsApp Dark Mode BG */
            --bg-secondary: #111b21;
            --bg-sidebar: #111b21;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #10b981; /* Neon Emerald Green */
            --accent-hover: #34d399;
            --border-color: #222e35;
            --chat-bg: #0b141a;
            --msg-sent: #005c4b; /* WhatsApp Dark Sent Message BG */
            --msg-received: #202c33;
            --msg-text-sent: #e9edef;
            --msg-text-received: #e9edef;
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            --neon-glow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        /* ================= BASE STYLES ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ================= AUTH CONTAINER ================= */
        .container {
            background-color: var(--bg-secondary);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .brand-logo-area h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 5px;
            text-shadow: var(--neon-glow);
        }

        .brand-logo-area p {
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        button.btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--neon-glow);
        }

        button.btn-submit:hover {
            background-color: var(--accent-hover);
        }

        /* ================= CHAT CONTAINER LAYOUT ================= */
        .chat-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            background-color: var(--bg-secondary);
            overflow: hidden;
            position: relative;
        }

        /* Sidebar styling */
        .sidebar {
            width: 320px;
            height: 100%;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-brand h4 {
            color: var(--accent-color);
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: var(--neon-glow);
        }

        .sidebar-brand span {
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        .search-box {
            padding: 15px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 28px;
            top: 28px;
            color: var(--text-secondary);
        }

        .search-box input {
            padding-left: 45px;
            margin-bottom: 0;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .user-item:hover, .user-item.active {
            background-color: var(--bg-primary);
        }

        .user-meta-left {
            display: flex;
            align-items: center;
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background-color: var(--accent-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            margin-right: 12px;
            position: relative;
        }

        /* Active Green Dot Indicator (Instagram Model) */
        .user-avatar.online-dot::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #10b981; /* Glowing Active Green */
            border: 2px solid var(--bg-sidebar);
            border-radius: 50%;
            bottom: 1px;
            right: 1px;
            box-shadow: 0 0 5px #10b981;
        }

        .user-details h5 {
            font-size: 15px;
            font-weight: 600;
        }

        /* Message Badges (WhatsApp Model) */
        .badge-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .unread-badge {
            background-color: #10b981;
            color: white;
            font-size: 11px;
            font-weight: bold;
            min-width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            box-shadow: 0 2px 5px rgba(16, 185, 129, 0.3);
        }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-secondary);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .footer-actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background-color: var(--bg-primary);
            color: var(--accent-color);
        }

        /* ================= SETTINGS POPUP MODAL ================= */
        .settings-panel {
            position: absolute;
            bottom: 70px;
            left: 15px;
            width: 290px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            font-weight: 700;
        }

        .settings-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        /* Theme Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-color);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        /* Rexo Web Link Button */
        .rex-link-btn {
            background-color: var(--bg-primary);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .rex-link-btn:hover {
            background-color: var(--accent-color);
            color: white;
        }

        /* ================= MAIN CHAT WINDOW ================= */
        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-primary);
            position: relative;
        }

        .chat-header {
            padding: 15px 25px;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .active-user-status {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .message-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background-color: var(--chat-bg);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Message Bubbles Styling with Time integration */
        .message {
            max-width: 60%;
            padding: 8px 14px 20px 14px; /* അടിയിൽ ടൈം വെക്കാൻ പാഡിങ് കൂട്ടി */
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.sent {
            align-self: flex-end;
            background-color: var(--msg-sent);
            color: var(--msg-text-sent);
            border-top-right-radius: 2px;
        }

        .message.received {
            align-self: flex-start;
            background-color: var(--msg-received);
            color: var(--msg-text-received);
            border-top-left-radius: 2px;
        }

        /* Time Stamp positioning inside bubbles (WhatsApp style) */
        .msg-time {
            font-size: 10px;
            color: var(--text-secondary);
            position: absolute;
            bottom: 4px;
            right: 10px;
            opacity: 0.8;
            font-weight: 500;
        }

        .message.sent .msg-time {
            color: #515c61;
        }

        /* Input area styling */
        .chat-input-area {
            padding: 15px 25px;
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            margin-bottom: 0;
        }

        .send-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--neon-glow);
        }

        .send-btn:hover {
            background-color: var(--accent-hover);
        }

        /* Mobile Responsive */
        .menu-btn, .close-btn {
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -100%;
                transition: left 0.3s ease;
            }
            .sidebar.active {
                left: 0;
            }
            .menu-btn {
                display: flex;
                position: absolute;
                left: 15px;
                top: 18px;
                z-index: 5;
            }
            .chat-header {
                padding-left: 65px;
            }
            .close-btn {
                display: block;
            }
        }
    </style>
</head>
<body>

    <!-- ================= AUTH CONTAINER ================= -->
    <div id="auth-container" class="container">
        <div class="brand-logo-area">
            <h1>Santhosh Messages</h1>
            <p>POWERED BY REXO INTERNATIONAL</p>
        </div>

        <!-- LOGIN SECTION -->
        <div id="login-section">
            <h2>Sign In</h2>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button id="login-btn-submit" class="btn-submit">Login</button>
            <p style="margin-top: 15px; font-size: 14px;">Don't have an account? <a href="#" id="go-to-signup" style="color: #10b981; font-weight: 600; text-decoration: none;">Create account</a></p>
            <div id="error-message" style="display: none; color: red; margin-top: 10px; font-weight: 500;"></div>
        </div>

        <!-- SIGNUP SECTION -->
        <div id="signup-section" style="display: none;">
            <h2>Create Account</h2>
            <input type="text" id="signup-username" placeholder="Choose Username">
            <input type="password" id="signup-password" placeholder="Password (Min 6 chars)">
            <button id="signup-btn-submit" class="btn-submit">Register</button>
            <p style="margin-top: 15px; font-size: 14px;">Already have an account? <a href="#" id="go-to-login" style="color: #10b981; font-weight: 600; text-decoration: none;">Back to Login</a></p>
            <div id="signup-error-message" style="display: none; color: red; margin-top: 10px; font-weight: 500;"></div>
        </div>
    </div>

    <!-- ================= CHAT CONTAINER ================= -->
    <div id="main-chat-container" class="chat-container" style="display: none;">
        
        <button id="menu-toggle-btn" class="action-btn menu-btn"><i class="fas fa-bars"></i></button>

        <!-- Sidebar -->
        <div id="chat-sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <h4>SANTHOSH</h4>
                    <span>MESSENGER</span>
                </div>
                <button id="close-sidebar-btn" class="action-btn close-btn"><i class="fas fa-times"></i></button>
            </div>
            
            <!-- Privacy Search Area -->
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-user-input" placeholder="Type exact username & press Enter...">
            </div>
            
            <div id="active-users-list" class="users-list">
                <!-- Chatted users / search results will render here -->
            </div>

            <!-- Settings Modal -->
            <div id="settings-panel" class="settings-panel">
                <div class="settings-header">
                    <span>Settings</span>
                    <button id="close-settings-btn" style="background:none; border:none; color:var(--text-secondary); cursor:pointer;"><i class="fas fa-times"></i></button>
                </div>
                <div class="settings-option">
                    <span>Dark Theme</span>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle-switch">
                        <span class="slider"></span>
                    </label>
                </div>
                <a href="http://rexointernational.dpdns.org" target="_blank" class="rex-link-btn">
                    <i class="fas fa-globe"></i> Open Rexo International
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle" style="font-size: 22px; color: var(--accent-color);"></i>
                    <span id="current-logged-user">Username</span>
                </div>
                <div class="footer-actions">
                    <button id="settings-toggle-btn" class="action-btn" title="Settings"><i class="fas fa-cog"></i></button>
                    <button id="logout-btn" class="action-btn" title="Logout" style="color: #ef4444;"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </div>

        <!-- Chat Window -->
        <div class="chat-window">
            <div class="chat-header">
                <div id="active-chat-avatar" class="user-avatar" style="display: none; width: 36px; height: 36px; font-size: 13px;"></div>
                <div>
                    <h2 id="chat-with-heading" style="font-size: 16px; font-weight: 600;">Select a user to start chat</h2>
                    <span id="chat-user-status" class="active-user-status"></span>
                </div>
            </div>
            <div id="chat-messages-box" class="message-container">
                <!-- Messages -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-message-input" placeholder="Type a message..." disabled>
                <button id="chat-send-btn" class="send-btn" disabled><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

    </div>

    <!-- ================= FIREBASE & SCRIPT ================= -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDXhvtxcmDVhScJwQu-0B4JI_pi2Ps5Ysg",
            authDomain: "mychatapp5643.firebaseapp.com",
            databaseURL: "https://mychatapp5643-default-rtdb.firebaseio.com/",
            projectId: "mychatapp5643",
            storageBucket: "mychatapp5643.firebasestorage.app",
            messagingSenderId: "328590556877",
            appId: "1:328590556877:web:e16c3b31fc22375428f384",
            measurementId: "G-BF11J6MH8Q"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // UI DOM Elements
        const authContainer = document.getElementById('auth-container');
        const loginSection = document.getElementById('login-section');
        const signupSection = document.getElementById('signup-section');
        const mainChatContainer = document.getElementById('main-chat-container');
        const themeToggle = document.getElementById('theme-toggle-switch');
        const settingsPanel = document.getElementById('settings-panel');
        const searchInput = document.getElementById('search-user-input');

        let currentUser = "";
        let selectedUser = "";
        let chattedUsers = []; // നിലവിൽ മുൻപ് സംസാരിച്ച യൂസർമാരുടെ ലിസ്റ്റ്

        // Theme Toggle
        themeToggle.addEventListener('change', (e) => {
            document.documentElement.setAttribute('data-theme', e.target.checked ? 'dark' : 'light');
        });

        document.getElementById('settings-toggle-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            settingsPanel.style.display = settingsPanel.style.display === 'flex' ? 'none' : 'flex';
        });

        document.getElementById('close-settings-btn').addEventListener('click', () => {
            settingsPanel.style.display = 'none';
        });

        document.addEventListener('click', (e) => {
            if(!settingsPanel.contains(e.target) && e.target.id !== 'settings-toggle-btn') {
                settingsPanel.style.display = 'none';
            }
        });

        document.getElementById('go-to-signup').addEventListener('click', (e) => {
            e.preventDefault();
            loginSection.style.display = 'none';
            signupSection.style.display = 'block';
        });
        document.getElementById('go-to-login').addEventListener('click', (e) => {
            e.preventDefault();
            signupSection.style.display = 'none';
            loginSection.style.display = 'block';
        });

        // --- SIGNUP LOGIC ---
        document.getElementById('signup-btn-submit').addEventListener('click', () => {
            const uName = document.getElementById('signup-username').value.trim().toLowerCase();
            const pWord = document.getElementById('signup-password').value.trim();
            const errBox = document.getElementById('signup-error-message');

            if(!uName || !pWord) {
                errBox.innerText = "Please fill in all fields.";
                errBox.style.display = 'block';
                return;
            }

            if(pWord.length < 6) {
                errBox.innerText = "Password must be at least 6 characters long!";
                errBox.style.display = 'block';
                return;
            }

            database.ref('users/' + uName).once('value', (snapshot) => {
                if(snapshot.exists()) {
                    errBox.innerText = "Username already taken!";
                    errBox.style.display = 'block';
                } else {
                    database.ref('users/' + uName).set({ 
                        password: pWord,
                        online: false,
                        lastSeen: Date.now()
                    }).then(() => {
                        alert("Account created successfully! Please login.");
                        signupSection.style.display = 'none';
                        loginSection.style.display = 'block';
                        errBox.style.display = 'none';
                    });
                }
            });
        });

        // --- LOGIN LOGIC ---
        document.getElementById('login-btn-submit').addEventListener('click', () => {
            const uName = document.getElementById('login-username').value.trim().toLowerCase();
            const pWord = document.getElementById('login-password').value.trim();
            const errBox = document.getElementById('error-message');

            if(!uName || !pWord) {
                errBox.innerText = "Please fill in all fields.";
                errBox.style.display = 'block';
                return;
            }

            database.ref('users/' + uName).once('value', (snapshot) => {
                if(snapshot.exists() && snapshot.val().password === pWord) {
                    currentUser = uName;
                    authContainer.style.display = 'none';
                    mainChatContainer.style.display = 'flex';
                    document.getElementById('current-logged-user').innerText = currentUser;
                    errBox.style.display = 'none';
                    
                    // സെറ്റ് ആക്ടീവ് സ്റ്റാറ്റസ്
                    setUserActiveStatus(true);
                    
                    // ലോഡ് ലിസ്റ്റ്
                    loadChattedUsersList();
                } else {
                    errBox.innerText = "Invalid Username or Password!";
                    errBox.style.display = 'block';
                }
            });
        });

        // --- USER ACTIVE STATUS SYSTEM (Instagram Model) ---
        function setUserActiveStatus(status) {
            if(currentUser) {
                database.ref('users/' + currentUser).update({
                    online: status,
                    lastSeen: Date.now()
                });
            }
        }

        // നമ്മൾ പേജ് ക്ലോസ് ചെയ്യുകയോ മാറുകയോ ചെയ്താൽ ഓഫ്‌ലൈൻ ആക്കാൻ
        window.addEventListener('beforeunload', () => {
            setUserActiveStatus(false);
        });

        // --- LOGOUT LOGIC ---
        document.getElementById('logout-btn').addEventListener('click', () => {
            setUserActiveStatus(false);
            currentUser = "";
            selectedUser = "";
            mainChatContainer.style.display = 'none';
            authContainer.style.display = 'block';
            document.getElementById('chat-with-heading').innerText = "Select a user to start chat";
            document.getElementById('chat-user-status').innerText = "";
            document.getElementById('chat-messages-box').innerHTML = "";
            document.getElementById('chat-message-input').disabled = true;
            document.getElementById('chat-send-btn').disabled = true;
        });

        // --- LOAD ONLY CHATTED USERS (പഴയ മെസ്സേജ് അയച്ചവർ മാത്രം) ---
        function loadChattedUsersList() {
            // ആദ്യം നമുക്ക് ഏതൊക്കെ റൂമിൽ മെസ്സേജ് നടന്നിട്ടുണ്ടെന്ന് നോക്കാം
            database.ref('chats').on('value', (snapshot) => {
                chattedUsers = [];
                snapshot.forEach((chatRoom) => {
                    const roomName = chatRoom.key;
                    if(roomName.includes(currentUser)) {
                        const otherPerson = roomName.replace(currentUser, "").replace("_", "");
                        if(!chattedUsers.includes(otherPerson)) {
                            chattedUsers.push(otherPerson);
                        }
                    }
                });
                renderSidebarList();
            });
        }

        // --- RENDER SIDEBAR USERS ---
        function renderSidebarList(searchedUser = null) {
            const usersListDiv = document.getElementById('active-users-list');
            usersListDiv.innerHTML = "";

            // ഒന്നുകിൽ സെർച്ച് ചെയ്ത് കിട്ടിയ ആൾ, അല്ലെങ്കിൽ മുൻപ് സംസാരിച്ചവരുടെ ലിസ്റ്റ്
            const finalDisplayList = searchedUser ? [searchedUser] : chattedUsers;

            if (finalDisplayList.length === 0) {
                usersListDiv.innerHTML = `<div style="text-align: center; color: var(--text-secondary); margin-top: 20px; font-size: 13px;">No active chats. Search username to start.</div>`;
                return;
            }

            finalDisplayList.forEach((name) => {
                if(name === currentUser) return;

                const userItem = document.createElement('div');
                userItem.classList.add('user-item');
                userItem.setAttribute('id', 'user-item-' + name);
                if(name === selectedUser) userItem.classList.add('active');

                const firstLetter = name.charAt(0).toUpperCase();

                userItem.innerHTML = `
                    <div class="user-meta-left">
                        <div class="user-avatar" id="avatar-status-${name}">${firstLetter}</div>
                        <div class="user-details">
                            <h5>${name}</h5>
                        </div>
                    </div>
                    <div class="badge-container">
                        <div class="unread-badge" id="badge-${name}" style="display: none;">0</div>
                    </div>
                `;

                userItem.addEventListener('click', () => {
                    document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
                    userItem.classList.add('active');
                    startChatWith(name);
                });

                usersListDiv.appendChild(userItem);

                // ഓൺലൈൻ പച്ച വട്ടം കാണിക്കാനുള്ള ലിസണർ (Instagram active status)
                trackOnlineStatus(name);
                
                // അൺറീഡ് മെസ്സേജ് ബാഡ്ജ്
                listenForUnreadMessages(name);
            });
        }

        // --- ONLINE STATUS TRACKER (Real-time update in sidebar) ---
        function trackOnlineStatus(username) {
            database.ref('users/' + username).on('value', (snapshot) => {
                const userObj = snapshot.val();
                const avatarDiv = document.getElementById('avatar-status-' + username);
                if(avatarDiv) {
                    if(userObj && userObj.online === true) {
                        avatarDiv.classList.add('online-dot');
                    } else {
                        avatarDiv.classList.remove('online-dot');
                    }
                }
                
                // ചാറ്റ് വിൻഡോ തുറന്നു വെച്ചിരിക്കുകയാണെങ്കിൽ ടോപ്പിൽ സ്റ്റാറ്റസ് മാറ്റാൻ
                if (selectedUser === username) {
                    updateHeaderStatus(userObj);
                }
            });
        }

        function updateHeaderStatus(userObj) {
            const statusSpan = document.getElementById('chat-user-status');
            if (userObj && userObj.online === true) {
                statusSpan.innerHTML = `<span style="color:#10b981; font-weight:600;"><i class="fas fa-circle" style="font-size:8px;"></i> Active now</span>`;
            } else if (userObj && userObj.lastSeen) {
                const dateStr = formatTime(userObj.lastSeen);
                statusSpan.innerText = "Last active at " + dateStr;
            } else {
                statusSpan.innerText = "Offline";
            }
        }

        // --- PRIVACY SEARCH IMPLEMENTATION (Exact search on Enter) ---
        searchInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const searchQuery = searchInput.value.trim().toLowerCase();
                if(!searchQuery) {
                    // സെർച്ച് ബോക്സ് കാലിയാണെങ്കിൽ വീണ്ടും പഴയ ലിസ്റ്റ് കാണിക്കുക
                    renderSidebarList();
                    return;
                }

                // ഫയർബേസിൽ ആ കൃത്യം പേരുള്ള യൂസർ ഉണ്ടോ എന്ന് നോക്കുന്നു
                database.ref('users/' + searchQuery).once('value', (snapshot) => {
                    if (snapshot.exists()) {
                        // അങ്ങനൊരു യൂസറുണ്ടെങ്കിൽ അവരെ മാത്രം ലിസ്റ്റിൽ താഴെ കാണിക്കും
                        renderSidebarList(searchQuery);
                    } else {
                        alert("User not found! Enter correct exact username.");
                    }
                });
            }
        });

        // --- UNREAD MESSAGES DETECTOR ---
        function listenForUnreadMessages(otherUser) {
            const chatId = currentUser < otherUser ? currentUser + "_" + otherUser : otherUser + "_" + currentUser;
            database.ref('chats/' + chatId).on('value', (snapshot) => {
                let unreadCount = 0;
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    if (data.sender === otherUser && data.read === false) {
                        unreadCount++;
                    }
                });

                const badge = document.getElementById('badge-' + otherUser);
                if (badge) {
                    if (unreadCount > 0 && selectedUser !== otherUser) {
                        badge.innerText = unreadCount;
                        badge.style.display = 'flex';
                    } else {
                        badge.style.display = 'none';
                    }
                }
            });
        }

        // --- START CHAT ---
        function startChatWith(name) {
            selectedUser = name;
            
            const avatar = document.getElementById('active-chat-avatar');
            avatar.innerText = name.charAt(0).toUpperCase();
            avatar.style.display = 'flex';
            
            document.getElementById('chat-with-heading').innerText = selectedUser;
            document.getElementById('chat-message-input').disabled = false;
            document.getElementById('chat-send-btn').disabled = false;
            
            // ആക്ടീവ് യൂസറുടെ ഓൺലൈൻ സ്റ്റാറ്റസ് ഹെഡ്ഡറിൽ കാണിക്കാൻ
            database.ref('users/' + name).once('value', (snapshot) => {
                updateHeaderStatus(snapshot.val());
            });

            markMessagesAsRead(name);
            loadMessages();
        }

        // --- MARK READ STATUS ---
        function markMessagesAsRead(otherUser) {
            const chatId = currentUser < otherUser ? currentUser + "_" + otherUser : otherUser + "_" + currentUser;
            database.ref('chats/' + chatId).once('value', (snapshot) => {
                snapshot.forEach((childSnapshot) => {
                    const key = childSnapshot.key;
                    const data = childSnapshot.val();
                    if (data.sender === otherUser && data.read === false) {
                        database.ref('chats/' + chatId + '/' + key).update({ read: true });
                    }
                });
            });
        }

        // --- LOAD MESSAGES WITH TIMESTAMP ---
        function loadMessages() {
            const chatId = currentUser < selectedUser ? currentUser + "_" + selectedUser : selectedUser + "_" + currentUser;
            database.ref('chats/' + chatId).off();
            database.ref('chats/' + chatId).on('value', (snapshot) => {
                const msgBox = document.getElementById('chat-messages-box');
                msgBox.innerHTML = "";
                
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    const msgDiv = document.createElement('div');
                    msgDiv.classList.add('message');
                    
                    if(data.sender === currentUser) {
                        msgDiv.classList.add('sent');
                    } else {
                        msgDiv.classList.add('received');
                        if (data.read === false) {
                            database.ref('chats/' + chatId + '/' + childSnapshot.key).update({ read: true });
                        }
                    }
                    
                    // സമയം ഫോർമാറ്റ് ചെയ്യുന്നു (WhatsApp Style)
                    const timeString = formatTime(data.timestamp);
                    
                    msgDiv.innerHTML = `
                        ${data.text}
                        <span class="msg-time">${timeString}</span>
                    `;
                    
                    msgBox.appendChild(msgDiv);
                });
                msgBox.scrollTop = msgBox.scrollHeight;
            });
        }

        // --- SEND MESSAGE ---
        document.getElementById('chat-send-btn').addEventListener('click', sendMessage);
        document.getElementById('chat-message-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const text = document.getElementById('chat-message-input').value.trim();
            if(!text || !selectedUser) return;
            
            const chatId = currentUser < selectedUser ? currentUser + "_" + selectedUser : selectedUser + "_" + currentUser;
            
            database.ref('chats/' + chatId).push({
                sender: currentUser,
                text: text,
                timestamp: Date.now(),
                read: false
            }).then(() => {
                document.getElementById('chat-message-input').value = "";
            });
        }

        // --- Helper Function: Time Formatting ---
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            let hours = date.getHours();
            let minutes = date.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // 0 വിനെ 12 ആക്കുന്നു
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return hours + ':' + minutes + ' ' + ampm;
        }

        // Mobile Actions
        document.getElementById('menu-toggle-btn').addEventListener('click', () => {
            document.getElementById('chat-sidebar').classList.add('active');
        });
        document.getElementById('close-sidebar-btn').addEventListener('click', () => {
            document.getElementById('chat-sidebar').classList.remove('active');
        });
    </script>
</body>
