<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santhosh Message</title>
    
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- EmailJS SDK Library -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        /* ==================== PREMIUM THEME COLORS ==================== */
        :root[data-theme="light"] {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-sidebar: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #0284c7;
            --accent-hover: #0369a1;
            --border-color: #e2e8f0;
            --chat-bg: #efeae2;
            --msg-sent: #d9fdd3;
            --msg-received: #ffffff;
            --msg-text-sent: #111b21;
            --msg-text-received: #111b21;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --tick-color: #8696a0;
            --tick-seen: #53bdeb;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0b141a;
            --bg-secondary: #111b21;
            --bg-sidebar: #111b21;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #7dd3fc;
            --border-color: #222e35;
            --chat-bg: #0b141a;
            --msg-sent: #005c4b;
            --msg-received: #202c33;
            --msg-text-sent: #e9edef;
            --msg-text-received: #e9edef;
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            --tick-color: #667781;
            --tick-seen: #53bdeb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ==================== AUTH CONTAINER ==================== */
        .auth-card {
            background: var(--bg-secondary);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .auth-card h2 {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .auth-card p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            font-weight: 500;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .auth-toggle {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-toggle span {
            color: var(--accent-color);
            cursor: pointer;
            font-weight: 600;
        }

        .error-msg {
            color: #ef4444;
            background: #fee2e2;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            display: none;
        }

        /* ==================== MAIN CHAT WINDOW ==================== */
        .chat-app-container {
            display: none;
            width: 100vw;
            height: 100vh;
            background: var(--bg-secondary);
        }

        .sidebar {
            width: 340px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-profile-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 18px;
        }

        .sidebar-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            margin-left: 15px;
        }

        .user-search-box {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .user-search-box input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            outline: none;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            gap: 15px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }

        .user-item:hover {
            background: var(--bg-primary);
        }

        .user-item-details {
            flex: 1;
        }

        .user-item-name {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
        }

        /* Chat Window Area */
        .chat-main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
        }

        .chat-header {
            padding: 15px 25px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .chat-messages-container {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-bubble {
            max-width: 65%;
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 15px;
            position: relative;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-bubble.sent {
            background: var(--msg-sent);
            color: var(--msg-text-sent);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble.received {
            background: var(--msg-received);
            color: var(--msg-text-received);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .msg-meta {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .chat-input-bar {
            padding: 15px 25px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-input-bar input {
            flex: 1;
            padding: 14px 20px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 25px;
            outline: none;
            font-size: 15px;
        }

        .btn-send {
            width: 48px;
            height: 48px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- ==================== AUTH SCREEN ==================== -->
    <div id="auth-screen-container" class="auth-card">
        <h2 id="auth-title">Welcome Back</h2>
        <p id="auth-subtitle">Login to connect with friends securely</p>
        
        <div id="error-message" class="error-msg"></div>

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="login-username" placeholder="Username">
        </div>
        <div id="email-field-group" class="input-group" style="display: none;">
            <i class="fas fa-envelope"></i>
            <input type="email" id="login-email" placeholder="Email Address">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="login-password" placeholder="Password">
        </div>

        <button id="login-btn-submit" class="btn-primary">Login</button>

        <div class="auth-toggle">
            <span id="toggle-auth-action" onclick="toggleAuthMode()">Create New Account</span>
        </div>
    </div>

    <!-- ==================== MAIN CHAT APP WINDOW ==================== -->
    <div id="main-chat-container" class="chat-app-container">
        <!-- Sidebar Setup -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-profile-info">
                    <div id="user-avatar" class="avatar-circle">U</div>
                    <div>
                        <h4 id="current-logged-user" style="font-size: 15px; font-weight:700;">Username</h4>
                        <span style="font-size: 12px; color: #10b981; font-weight:600;">Online</span>
                    </div>
                </div>
                <div class="sidebar-actions">
                    <button onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
                    <button onclick="handleUserLogout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <div class="user-search-box">
                <input type="text" id="search-users-input" placeholder="Search or start new chat...">
            </div>

            <div id="active-users-list" class="users-list">
                <!-- Registered users dynamic list load here -->
            </div>
        </div>

        <!-- Chat View Area -->
        <div class="chat-main-area">
            <div class="chat-header">
                <div>
                    <h3 id="active-chat-user" style="font-size: 16px; font-weight: 700;">Select a User to Chat</h3>
                    <p id="active-chat-status" style="font-size: 12px; color: var(--text-secondary);"></p>
                </div>
            </div>

            <!-- Messages Screen Window -->
            <div id="chat-messages-screen" class="chat-messages-container">
                <div style="text-align:center; color: var(--text-secondary); margin-top:200px; font-size:14px;">
                    <i class="fas fa-comments" style="font-size:48px; color: var(--border-color); margin-bottom:10px;"></i>
                    <p>Select someone from the list to start messaging!</p>
                </div>
            </div>

            <!-- Input Controls Area -->
            <div class="chat-input-bar">
                <input type="text" id="message-typed-input" placeholder="Type a message...">
                <button id="btn-msg-send" class="btn-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Firebase System Integration CDN Script Engines -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // --- Core Firebase Database Initial Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyDXhvtxcmDVhScJwQu-0B4JI_pi2Ps5Ysg",
            authDomain: "mychatapp5643.firebaseapp.com",
            databaseURL: "https://mychatapp5643-default-rtdb.firebaseio.com/",
            projectId: "mychatapp5643",
            storageBucket: "mychatapp5643.firebasestorage.app",
            messagingSenderId: "328590556877",
            appId: "1:328590556877:web:e16c3b31fc22375428f384"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // State variables
        let isRegisterMode = false;
        let currentUser = "";
        let targetChatUser = "";
        let activeChatKey = "";

        const authContainer = document.getElementById('auth-screen-container');
        const mainChatContainer = document.getElementById('main-chat-container');
        const errBox = document.getElementById('error-message');

        // Toggle Login vs Register Interface View Screen Mode
        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            errBox.style.display = 'none';
            document.getElementById('login-username').value = "";
            document.getElementById('login-password').value = "";
            document.getElementById('login-email').value = "";
            
            if(isRegisterMode) {
                document.getElementById('auth-title').innerText = "Create Account";
                document.getElementById('auth-subtitle').innerText = "Sign up to join the chat system ecosystem";
                document.getElementById('email-field-group').style.display = "block";
                document.getElementById('login-btn-submit').innerText = "Register Now";
                document.getElementById('toggle-auth-action').innerText = "Already have an account? Login";
            } else {
                document.getElementById('auth-title').innerText = "Welcome Back";
                document.getElementById('auth-subtitle').innerText = "Login to connect with friends securely";
                document.getElementById('email-field-group').style.display = "none";
                document.getElementById('login-btn-submit').innerText = "Login";
                document.getElementById('toggle-auth-action').innerText = "Create New Account";
            }
        }

        // Auth Submit Event Listener Handler Pipeline
        document.getElementById('login-btn-submit').addEventListener('click', () => {
            const uName = document.getElementById('login-username').value.trim().toLowerCase();
            const pWord = document.getElementById('login-password').value.trim();
            const eMail = document.getElementById('login-email').value.trim();

            if(!uName || !pWord || (isRegisterMode && !eMail)) {
                errBox.innerText = "All fields are strictly mandatory!";
                errBox.style.display = 'block';
                return;
            }

            if(isRegisterMode) {
                // Register Engine Pipeline
                database.ref('users/' + uName).once('value', (snapshot) => {
                    if(snapshot.exists()) {
                        errBox.innerText = "Username is already occupied!";
                        errBox.style.display = 'block';
                    } else {
                        database.ref('users/' + uName).set({
                            password: pWord,
                            email: eMail,
                            online: false,
                            banned: false,
                            lastSeen: Date.now()
                        }).then(() => {
                            alert("Registration Successful! Please login.");
                            toggleAuthMode();
                        });
                    }
                });
            } else {
                // Login Engine Pipeline with **NEW IP TRACKING CONFIG**
                database.ref('users/' + uName).once('value', (snapshot) => {
                    if(snapshot.exists()) {
                        const userData = snapshot.val();
                        
                        // 1. Check if the user is banned by management
                        if(userData.banned === true) {
                            errBox.innerText = "ACCESS DENIED: Your account has been BANNED by management.";
                            errBox.style.display = 'block';
                            return;
                        }

                        // 2. Password Check Logic
                        if(userData.password === pWord) {
                            
                            // Track user's IP address silently in background for Developer Panel
                            fetch('https://api.ipify.org?format=json')
                            .then(res => res.json())
                            .then(data => {
                                database.ref('users/' + uName).update({ 
                                    ip: data.ip,
                                    lastSeen: Date.now(),
                                    online: true
                                });
                            }).catch(e => {
                                // Fallback if IP capture fails
                                database.ref('users/' + uName).update({ 
                                    lastSeen: Date.now(),
                                    online: true
                                });
                            });

                            currentUser = uName;
                            localStorage.setItem('chat_session_user', currentUser);
                            
                            // Interface transition states
                            authContainer.style.display = 'none';
                            mainChatContainer.style.display = 'flex';
                            document.getElementById('current-logged-user').innerText = currentUser;
                            document.getElementById('user-avatar').innerText = currentUser.charAt(0).toUpperCase();
                            
                            setUserActiveStatus(true);
                            loadChattedUsersList();
                            errBox.style.display = 'none';
                        } else {
                            errBox.innerText = "Incorrect Password! Please try again.";
                            errBox.style.display = 'block';
                        }
                    } else {
                        errBox.innerText = "Username not found! Register an account.";
                        errBox.style.display = 'block';
                    }
                });
            }
        });

        // Online/Offline Presence Synchronization Status Tracker
        function setUserActiveStatus(status) {
            if(!currentUser) return;
            database.ref('users/' + currentUser).update({
                online: status,
                lastSeen: Date.now()
            });
        }

        window.addEventListener('beforeunload', () => setUserActiveStatus(false));

        // Load and Listen to Registered System Database Contacts List
        function loadChattedUsersList() {
            database.ref('users').on('value', (snapshot) => {
                const listContainer = document.getElementById('active-users-list');
                listContainer.innerHTML = "";
                
                snapshot.forEach((child) => {
                    const nameKey = child.key;
                    const uData = child.val();

                    if(nameKey === currentUser || uData.banned === true) return; // Hide self and banned users

                    const item = document.createElement('div');
                    item.className = "user-item";
                    item.onclick = () => initChatWithSelectedUser(nameKey);
                    
                    item.innerHTML = `
                        <div class="avatar-circle">${nameKey.charAt(0).toUpperCase()}</div>
                        <div class="user-item-details">
                            <div class="user-item-name">
                                <span>${nameKey}</span>
                                ${uData.online ? '<div class="online-dot"></div>' : '<span style="font-size:11px; color:var(--text-secondary);">off</span>'}
                            </div>
                        </div>
                    `;
                    listContainer.appendChild(item);
                });
            });
        }

        // Initialize Chat Engine Room Session
        function initChatWithSelectedUser(targetUser) {
            targetChatUser = targetUser;
            document.getElementById('active-chat-user').innerText = targetChatUser;
            
            // Generate combined primary sorted room hash index key id
            activeChatKey = currentUser < targetChatUser ? `${currentUser}_${targetChatUser}` : `${targetChatUser}_${currentUser}`;
            
            // Listen to room online states
            database.ref('users/' + targetChatUser).on('value', (snapshot) => {
                const d = snapshot.val();
                document.getElementById('active-chat-status').innerText = d.online ? "Active Now" : "Offline";
            });

            loadChatMessagesLogs();
        }

        // Fetch Room Transaction Messages Data Pipeline Logs
        function loadChatMessagesLogs() {
            database.ref('messages/' + activeChatKey).on('value', (snapshot) => {
                const msgBox = document.getElementById('chat-messages-screen');
                msgBox.innerHTML = "";
                
                if(!snapshot.exists()) {
                    msgBox.innerHTML = `<p style="text-align:center; color: var(--text-secondary); margin-top:100px;">No messages here yet. Say Hi!</p>`;
                    return;
                }

                snapshot.forEach((child) => {
                    const m = child.val();
                    const b = document.createElement('div');
                    b.className = `msg-bubble ${m.sender === currentUser ? 'sent' : 'received'}`;
                    
                    const time = new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    b.innerHTML = `
                        <div>${m.text}</div>
                        <div class="msg-meta">
                            <span>${time}</span>
                            ${m.sender === currentUser ? '<i class="fas fa-check-double" style="color:var(--tick-seen)"></i>' : ''}
                        </div>
                    `;
                    msgBox.appendChild(b);
                });
                msgBox.scrollTop = msgBox.scrollHeight;
            });
        }

        // Dispatch Message Packet Transmitter Action Trigger Engine Handler
        document.getElementById('btn-msg-send').addEventListener('click', dispatchMessagePacket);
        document.getElementById('message-typed-input').addEventListener('keydown', (e) => {
            if(e.key === 'Enter') dispatchMessagePacket();
        });

        function dispatchMessagePacket() {
            const txt = document.getElementById('message-typed-input').value.trim();
            if(!txt || !activeChatKey) return;

            const packet = {
                sender: currentUser,
                text: txt,
                timestamp: Date.now()
            };

            database.ref('messages/' + activeChatKey).push(packet).then(() => {
                document.getElementById('message-typed-input').value = "";
            });
        }

        // Theme Toggle
        function toggleDarkMode() {
            const root = document.documentElement;
            const currentTheme = root.getAttribute('data-theme');
            root.setAttribute('data-theme', currentTheme === 'light' ? 'dark' : 'light');
        }

        // Logout Processing
        function handleUserLogout() {
            setUserActiveStatus(false);
            localStorage.removeItem('chat_session_user');
            location.reload();
        }

        // Auto Persistent Session Restorer Init Hook Engine
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('chat_session_user');
            if(saved) {
                currentUser = saved;
                database.ref('users/' + currentUser).once('value', (s) => {
                    if(s.exists() && s.val().banned !== true) {
                        authContainer.style.display = 'none';
                        mainChatContainer.style.display = 'flex';
                        document.getElementById('current-logged-user').innerText = currentUser;
                        document.getElementById('user-avatar').innerText = currentUser.charAt(0).toUpperCase();
                        setUserActiveStatus(true);
                        loadChattedUsersList();
                    } else {
                        localStorage.removeItem('chat_session_user');
                    }
                });
            }
        });
    </script>
</body>
    </html>
