<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santhosh Message</title>
    
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- EmailJS SDK Library -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        /* ==================== PREMIUM THEME COLORS ==================== */
        :root[data-theme="light"] {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-sidebar: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #0284c7;
            --accent-hover: #0369a1;
            --border-color: #e2e8f0;
            --chat-bg: #efeae2;
            --chat-pattern: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            --msg-sent: #d9fdd3;
            --msg-received: #ffffff;
            --msg-text-sent: #111b21;
            --msg-text-received: #111b21;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --tick-color: #8696a0;
            --tick-seen: #53bdeb;
            --unread-bg: #22c55e;
        }

        :root[data-theme="dark"] {
            --bg-primary: #0b141a;
            --bg-secondary: #111b21;
            --bg-sidebar: #111b21;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #7dd3fc;
            --border-color: #222e35;
            --chat-bg: #0b141a;
            --chat-pattern: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            --msg-sent: #005c4b;
            --msg-received: #202c33;
            --msg-text-sent: #e9edef;
            --msg-text-received: #e9edef;
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            --tick-color: #667781;
            --tick-seen: #53bdeb;
            --unread-bg: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .auth-card {
            background: var(--bg-secondary);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .auth-card h2 {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .auth-card p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            font-weight: 500;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2);
            margin-top: 5px;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .auth-toggle {
            margin-top: 18px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-toggle span {
            color: var(--accent-color);
            cursor: pointer;
            font-weight: 600;
        }

        .error-msg {
            color: #ef4444;
            background: #fee2e2;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            display: none;
        }

        .warning-box {
            background: #fef3c7;
            color: #92400e;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 15px;
            display: none;
            text-align: left;
        }

        /* ==================== MAIN CHAT WINDOW ==================== */
        .chat-app-container {
            display: none;
            width: 100vw;
            height: 100vh;
            background: var(--bg-secondary);
        }

        .sidebar {
            width: 360px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-profile-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
        }

        .sidebar-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            margin-left: 10px;
            padding: 6px;
            border-radius: 8px;
        }

        .user-search-box {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .user-search-box i {
            position: absolute;
            left: 32px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .user-search-box input {
            width: 100%;
            padding: 10px 14px 10px 36px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            outline: none;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            gap: 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }

        .user-item:hover, .user-item.active {
            background: var(--bg-primary);
        }

        .user-item-name {
            font-weight: 700;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
        }

        .offline-dot {
            width: 10px;
            height: 10px;
            background: #94a3b8;
            border-radius: 50%;
        }

        .unread-badge {
            background: var(--unread-bg);
            color: white;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            margin-left: auto;
        }

        /* WhatsApp Style Wallpaper Canvas */
        .chat-main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            background-image: var(--chat-pattern);
            background-repeat: repeat;
            position: relative;
        }

        .chat-header {
            padding: 16px 25px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .chat-messages-container {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-bubble {
            max-width: 65%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            position: relative;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .msg-bubble.sent {
            background: var(--msg-sent);
            color: var(--msg-text-sent);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .msg-bubble.received {
            background: var(--msg-received);
            color: var(--msg-text-received);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg-delete-btn {
            display: none;
            position: absolute;
            top: 4px;
            right: 6px;
            font-size: 11px;
            color: #ef4444;
            cursor: pointer;
        }

        .msg-bubble:hover .msg-delete-btn {
            display: block;
        }

        .msg-meta {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .chat-input-bar {
            padding: 15px 25px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-input-bar input {
            flex: 1;
            padding: 14px 20px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 25px;
            outline: none;
        }

        .btn-send {
            width: 46px;
            height: 46px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; }
            .chat-main-area { display: none; }
            .mobile-active .sidebar { display: none; }
            .mobile-active .chat-main-area { display: flex; }
        }
    </style>
</head>
<body>

    <!-- AUTHENTICATION FORM SCREEN -->
    <div id="auth-screen-container" class="auth-card">
        <h2 id="auth-title">Welcome Back</h2>
        <p id="auth-subtitle">Login to connect with friends</p>
        
        <div id="error-message" class="error-msg"></div>
        <div id="warning-message" class="warning-box">
            <i class="fas fa-exclamation-triangle"></i> <strong>Spam Notice:</strong> Check your <b>Spam/Junk folder</b> if you don't receive the OTP code in Inbox!
        </div>

        <!-- Inputs for Login/Signup -->
        <div id="main-fields">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="login-username" placeholder="Username">
            </div>
            <div id="email-field-group" class="input-group" style="display: none;">
                <i class="fas fa-envelope"></i>
                <input type="email" id="login-email" placeholder="Email Address">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="login-password" placeholder="Password">
            </div>
        </div>

        <!-- OTP Step Container -->
        <div id="otp-fields" style="display: none;">
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="text" id="otp-input" placeholder="Enter 6-Digit OTP">
            </div>
            <button id="verify-otp-btn" class="btn-primary" onclick="verifyAndRegister()">Verify OTP & Register</button>
            <button class="btn-primary" style="background:#64748b; margin-top:8px;" onclick="sendOTPCode()">Resend OTP</button>
        </div>

        <button id="login-btn-submit" class="btn-primary" onclick="handleAuthAction()">Login</button>

        <div class="auth-toggle">
            <span id="toggle-auth-action" onclick="toggleAuthMode()">Create New Account</span>
        </div>
    </div>

    <!-- MAIN CHAT APP CONTAINER -->
    <div id="main-chat-container" class="chat-app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-profile-info">
                    <div id="user-avatar" class="avatar-circle">U</div>
                    <div>
                        <h4 id="current-logged-user" style="font-size: 15px; font-weight:700;">Username</h4>
                        <span style="font-size: 12px; color: #10b981; font-weight:600;">Online</span>
                    </div>
                </div>
                <div class="sidebar-actions">
                    <button onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
                    <button onclick="handleUserLogout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <div class="user-search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-users-input" placeholder="Search users..." onkeyup="filterUsersList()">
            </div>

            <div id="active-users-list" class="users-list"></div>
        </div>

        <div class="chat-main-area">
            <div class="chat-header">
                <div style="display:flex; align-items:center; gap:12px;">
                    <button id="mobile-back-btn" onclick="closeMobileChat()" style="display:none; background:none; border:none; color:var(--text-primary); font-size:18px;"><i class="fas fa-arrow-left"></i></button>
                    <div id="chat-header-avatar" class="avatar-circle" style="display:none;"></div>
                    <div>
                        <h3 id="active-chat-user" style="font-size: 16px; font-weight: 700;">Select a User to Chat</h3>
                        <p id="active-chat-status" style="font-size: 12px; color: var(--text-secondary);"></p>
                    </div>
                </div>
            </div>

            <div id="chat-messages-screen" class="chat-messages-container"></div>

            <div class="chat-input-bar">
                <input type="text" id="message-typed-input" placeholder="Type a message...">
                <button id="btn-msg-send" class="btn-send" onclick="dispatchMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Firebase System Integration -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Init EmailJS with Public Key
        (function(){
            emailjs.init("YOUR_EMAILJS_PUBLIC_KEY"); // Replace with EmailJS key if needed
        })();

        const firebaseConfig = {
            apiKey: "AIzaSyDXhvtxcmDVhScJwQu-0B4JI_pi2Ps5Ysg",
            authDomain: "mychatapp5643.firebaseapp.com",
            databaseURL: "https://mychatapp5643-default-rtdb.firebaseio.com/",
            projectId: "mychatapp5643",
            storageBucket: "mychatapp5643.firebasestorage.app",
            messagingSenderId: "328590556877",
            appId: "1:328590556877:web:e16c3b31fc22375428f384"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let isRegisterMode = false;
        let generatedOTP = "";
        let currentUser = "";
        let targetChatUser = "";
        let activeChatKey = "";
        let allUsersData = {};

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('warning-message').style.display = 'none';
            document.getElementById('otp-fields').style.display = 'none';
            document.getElementById('main-fields').style.display = 'block';

            if(isRegisterMode) {
                document.getElementById('auth-title').innerText = "Create Account";
                document.getElementById('auth-subtitle').innerText = "Sign up with Email OTP";
                document.getElementById('email-field-group').style.display = "block";
                document.getElementById('login-btn-submit').innerText = "Send Verification OTP";
                document.getElementById('toggle-auth-action').innerText = "Already have an account? Login";
            } else {
                document.getElementById('auth-title').innerText = "Welcome Back";
                document.getElementById('auth-subtitle').innerText = "Login to connect securely";
                document.getElementById('email-field-group').style.display = "none";
                document.getElementById('login-btn-submit').innerText = "Login";
                document.getElementById('toggle-auth-action').innerText = "Create New Account";
            }
        }

        async function handleAuthAction() {
            const uName = document.getElementById('login-username').value.trim().toLowerCase();
            const pWord = document.getElementById('login-password').value.trim();
            const eMail = document.getElementById('login-email').value.trim();
            const errBox = document.getElementById('error-message');

            if(!uName || !pWord || (isRegisterMode && !eMail)) {
                errBox.innerText = "All fields are required!";
                errBox.style.display = 'block';
                return;
            }

            if(isRegisterMode) {
                database.ref('users/' + uName).once('value', (snapshot) => {
                    if(snapshot.exists()) {
                        errBox.innerText = "Username already taken!";
                        errBox.style.display = 'block';
                    } else {
                        sendOTPCode();
                    }
                });
            } else {
                // Login Flow
                database.ref('users/' + uName).once('value', (snapshot) => {
                    if(snapshot.exists()) {
                        const userData = snapshot.val();
                        if(userData.password === pWord) {
                            currentUser = uName;
                            localStorage.setItem('chat_session_user', currentUser);
                            openChatApplication();
                        } else {
                            errBox.innerText = "Incorrect Password!";
                            errBox.style.display = 'block';
                        }
                    } else {
                        errBox.innerText = "Username not found!";
                        errBox.style.display = 'block';
                    }
                });
            }
        }

        function sendOTPCode() {
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            const eMail = document.getElementById('login-email').value.trim();

            document.getElementById('warning-message').style.display = 'block';
            document.getElementById('main-fields').style.display = 'none';
            document.getElementById('login-btn-submit').style.display = 'none';
            document.getElementById('otp-fields').style.display = 'block';

            // Local fallback test option
            console.log("Generated Verification OTP:", generatedOTP);
            alert("OTP Code Sent to your Email! (Test OTP: " + generatedOTP + ")");
        }

        function verifyAndRegister() {
            const userEnteredOTP = document.getElementById('otp-input').value.trim();
            const errBox = document.getElementById('error-message');

            if(userEnteredOTP === generatedOTP) {
                const uName = document.getElementById('login-username').value.trim().toLowerCase();
                const pWord = document.getElementById('login-password').value.trim();
                const eMail = document.getElementById('login-email').value.trim();

                database.ref('users/' + uName).set({
                    password: pWord,
                    email: eMail,
                    online: true,
                    lastSeen: Date.now()
                }).then(() => {
                    alert("Account Created & Verified Successfully!");
                    currentUser = uName;
                    localStorage.setItem('chat_session_user', currentUser);
                    openChatApplication();
                });
            } else {
                errBox.innerText = "Invalid OTP Code! Check Spam folder.";
                errBox.style.display = 'block';
            }
        }

        function openChatApplication() {
            document.getElementById('auth-screen-container').style.display = 'none';
            document.getElementById('main-chat-container').style.display = 'flex';
            document.getElementById('current-logged-user').innerText = currentUser;
            document.getElementById('user-avatar').innerText = currentUser.charAt(0).toUpperCase();
            loadUsersList();
        }

        function loadUsersList() {
            database.ref('users').on('value', (snapshot) => {
                allUsersData = snapshot.val() || {};
                renderUsersUI(allUsersData);
            });
        }

        function renderUsersUI(data) {
            const listContainer = document.getElementById('active-users-list');
            listContainer.innerHTML = "";

            Object.keys(data).forEach((nameKey) => {
                if(nameKey === currentUser) return;
                const uData = data[nameKey];
                const chatKey = currentUser < nameKey ? `${currentUser}_${nameKey}` : `${nameKey}_${currentUser}`;

                const item = document.createElement('div');
                item.className = `user-item ${targetChatUser === nameKey ? 'active' : ''}`;
                item.onclick = () => initChatWithUser(nameKey);

                database.ref('messages/' + chatKey).on('value', (snapshot) => {
                    let unreadCount = 0;
                    snapshot.forEach((child) => {
                        const msg = child.val();
                        if (msg.sender === nameKey && !msg.read) unreadCount++;
                    });

                    item.innerHTML = `
                        <div class="avatar-circle">${nameKey.charAt(0).toUpperCase()}</div>
                        <div style="flex:1;">
                            <div class="user-item-name">
                                <span>${nameKey}</span>
                                ${uData.online ? '<div class="online-dot"></div>' : '<div class="offline-dot"></div>'}
                            </div>
                        </div>
                        ${unreadCount > 0 ? `<div class="unread-badge">${unreadCount}</div>` : ''}
                    `;
                });

                listContainer.appendChild(item);
            });
        }

        function initChatWithUser(targetUser) {
            targetChatUser = targetUser;
            document.getElementById('active-chat-user').innerText = targetChatUser;
            const headerAvatar = document.getElementById('chat-header-avatar');
            headerAvatar.style.display = 'flex';
            headerAvatar.innerText = targetChatUser.charAt(0).toUpperCase();

            activeChatKey = currentUser < targetChatUser ? `${currentUser}_${targetChatUser}` : `${targetChatUser}_${currentUser}`;

            // Mark Read
            database.ref('messages/' + activeChatKey).once('value', (snapshot) => {
                snapshot.forEach((child) => {
                    if (child.val().sender === targetChatUser) {
                        database.ref('messages/' + activeChatKey + '/' + child.key).update({ read: true });
                    }
                });
            });

            loadChatMessages();
        }

        function loadChatMessages() {
            database.ref('messages/' + activeChatKey).on('value', (snapshot) => {
                const msgBox = document.getElementById('chat-messages-screen');
                msgBox.innerHTML = "";

                snapshot.forEach((child) => {
                    const m = child.val();
                    const msgId = child.key;
                    const b = document.createElement('div');
                    b.className = `msg-bubble ${m.sender === currentUser ? 'sent' : 'received'}`;

                    const time = new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    b.innerHTML = `
                        ${m.sender === currentUser ? `<i class="fas fa-trash msg-delete-btn" onclick="deleteMessage('${msgId}')"></i>` : ''}
                        <div>${m.text}</div>
                        <div class="msg-meta">
                            <span>${time}</span>
                            ${m.sender === currentUser ? '<i class="fas fa-check-double" style="color:var(--tick-seen)"></i>' : ''}
                        </div>
                    `;
                    msgBox.appendChild(b);
                });
                msgBox.scrollTop = msgBox.scrollHeight;
            });
        }

        function deleteMessage(msgId) {
            if(confirm("Are you sure you want to delete this message?")) {
                database.ref('messages/' + activeChatKey + '/' + msgId).remove();
            }
        }

        function dispatchMessage() {
            const txt = document.getElementById('message-typed-input').value.trim();
            if(!txt || !activeChatKey) return;

            database.ref('messages/' + activeChatKey).push({
                sender: currentUser,
                text: txt,
                timestamp: Date.now(),
                read: false
            }).then(() => {
                document.getElementById('message-typed-input').value = "";
            });
        }

        function toggleDarkMode() {
            const root = document.documentElement;
            root.setAttribute('data-theme', root.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }

        function handleUserLogout() {
            localStorage.removeItem('chat_session_user');
            location.reload();
        }
    </script>
</body>
</html>
